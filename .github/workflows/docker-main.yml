name: Docker Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  repository_dispatch:
    types: [trigger-workflow]
  workflow_dispatch:

permissions: write-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HASH_FILE: build_hash

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Update hash file' }}

    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read HASH_FILE content
        id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }}) || true
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  check:
    name: Check Should Rebuild
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.use_content.outputs.canceled }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: innei-dev/shiroi
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true

      - name: Use content from prev job and compare
        id: use_content
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          file_hash=$FILE_HASH
          current_hash=$(git rev-parse --short HEAD)
          echo "File Hash: $file_hash"
          echo "Current Git Hash: $current_hash"
          if [ "$file_hash" == "$current_hash" ]; then
            echo "Hashes match. Stopping workflow."
            echo "canceled=true" >> $GITHUB_OUTPUT
          else
            echo "Hashes do not match. Continuing workflow."
          fi

  build:
    name: Build artifact
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}

    strategy:
      matrix:
        node-version: [lts/*]

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      branch: ${{ steps.vars.outputs.branch }}
      date_tag: ${{ steps.vars.outputs.date_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: innei-dev/shiroi
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Get version info
        id: vars
        shell: bash
        run: |
          # Git 短哈希（用于内部版本校验）
          SHA_SHORT=$(git rev-parse --short HEAD)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # 日期版本标签，格式：YY.MM.DD（例如 26.04.09）
          # 使用 UTC 时间确保跨时区一致性
          DATE_TAG=$(date -u +"%y.%m.%d")
          echo "date_tag=$DATE_TAG" >> $GITHUB_OUTPUT

          echo "SHA_SHORT=$SHA_SHORT"
          echo "BRANCH=$BRANCH"
          echo "DATE_TAG=$DATE_TAG"

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        env:
          DATE_TAG: ${{ steps.vars.outputs.date_tag }}
          DOCKER_NAMESPACE: ${{ secrets.DOCKER_NAMESPACE }}
        run: |
          docker build \
            -t ghcr.io/${DOCKER_NAMESPACE}/shiroi:latest \
            -t ghcr.io/${DOCKER_NAMESPACE}/shiroi:${DATE_TAG} \
            .

      - name: Push Docker Image to GitHub
        env:
          DATE_TAG: ${{ steps.vars.outputs.date_tag }}
          DOCKER_NAMESPACE: ${{ secrets.DOCKER_NAMESPACE }}
        run: |
          docker push ghcr.io/${DOCKER_NAMESPACE}/shiroi:latest
          docker push ghcr.io/${DOCKER_NAMESPACE}/shiroi:${DATE_TAG}

  store:
    name: Store artifact commit version
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Use outputs from build
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          BRANCH: ${{ needs.build.outputs.branch }}
          DATE_TAG: ${{ needs.build.outputs.date_tag }}
        run: |
          echo "SHA Short from build: $SHA_SHORT"
          echo "Branch from build: $BRANCH"
          echo "Date Tag from build: $DATE_TAG"

      - name: Write hash to file
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: |
          echo "SHA_SHORT: $SHA_SHORT"
          echo $SHA_SHORT > ${{ env.HASH_FILE }}

      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.HASH_FILE }}
          git status
          git commit -a -m "Update hash file"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
