name: Docker Build and Publish

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间 11:00 (UTC+8) = UTC 03:00
    - cron: '0 3 * * *'
  repository_dispatch:
    types: [trigger-workflow]

# 最小权限原则
permissions:
  contents: write      # 用于提交 hash 文件更新
  packages: write      # 用于推送镜像到 GHCR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_HASH_FILE: build_hash               # 存储上次构建 commit hash 的文件
  SOURCE_REPO: innei-dev/shiroi             # 源代码仓库
  REGISTRY_NAMESPACE: ${{ secrets.DOCKER_NAMESPACE }}  # GHCR 命名空间

jobs:
  # ------------------------------------------------------------
  # Job 1: 读取当前仓库中缓存的 hash 值
  # ------------------------------------------------------------
  prepare:
    name: Read cached hash
    runs-on: ubuntu-latest
    # 如果本次推送的 commit message 是更新 hash 文件，跳过检查（避免死循环）
    if: ${{ github.event.head_commit.message != 'Update hash file' }}
    outputs:
      hash_content: ${{ steps.read.outputs.hash_content }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Read existing hash file
        id: read
        run: |
          # 文件可能不存在，使用 || true 防止失败
          content=$(cat ${{ env.CACHE_HASH_FILE }} 2>/dev/null || true)
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------
  # Job 2: 检查是否需要重新构建
  # ------------------------------------------------------------
  check:
    name: Check if rebuild needed
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.compare.outputs.canceled }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}        # 需要访问私有仓库的 PAT
          fetch-depth: 0
          lfs: true

      - name: Compare cached hash with current commit
        id: compare
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
        run: |
          current_hash=$(git rev-parse --short HEAD)
          echo "Cached hash: '${FILE_HASH}'"
          echo "Current hash: '${current_hash}'"

          # 只有当缓存的 hash 非空且与当前 hash 完全一致时才跳过构建
          if [ -n "$FILE_HASH" ] && [ "$FILE_HASH" = "$current_hash" ]; then
            echo "✅ No changes detected. Skipping build."
            echo "canceled=true" >> $GITHUB_OUTPUT
          else
            echo "🔄 Changes detected or first build. Proceeding."
          fi

  # ------------------------------------------------------------
  # Job 3: 构建并推送 Docker 镜像
  # ------------------------------------------------------------
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}
    outputs:
      sha_short: ${{ steps.store.outputs.sha_short }}
      branch: ${{ steps.store.outputs.branch }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_NAMESPACE }}/shiroi:latest
            ghcr.io/${{ env.REGISTRY_NAMESPACE }}/shiroi:${{ github.sha }}
          cache-from: type=gha      # 使用 GitHub Actions 缓存
          cache-to: type=gha,mode=max

      - name: Store git metadata for next job
        id: store
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------
  # Job 4: 更新缓存 hash 文件（写回当前仓库）
  # ------------------------------------------------------------
  store:
    name: Update cache hash
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # 允许后续使用 GITHUB_TOKEN 推送

      - name: Write new hash to file
        run: |
          echo "${{ needs.build.outputs.sha_short }}" > ${{ env.CACHE_HASH_FILE }}
          echo "Written hash: ${{ needs.build.outputs.sha_short }}"

      - name: Commit and push if changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ${{ env.CACHE_HASH_FILE }}
          
          if git diff --cached --quiet; then
            echo "📦 Hash unchanged, nothing to commit."
          else
            git commit -m "Update hash file"
            git push
            echo "🚀 Hash file updated and pushed."
          fi
